<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>پیام‌رسان Hobby Land</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* ================= صفحه ورود ================= */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f2c52 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 30px 25px 40px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .login-avatar {
            width: 110px;
            height: 110px;
            margin: -55px auto 15px auto;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_0000000082a8720aa7656c36feffa591.png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #1e3c72;
            font-size: 26px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            background: #f8f9fa;
            outline: none;
        }

        .login-box input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.2);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* ================= صفحه چت ================= */
        .chat-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_0000000062ac71fdbf8b53fc09d97b00.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        
        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        /* هدر با بنر و آنلاین سمت راست */
        .chat-header {
            background: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
            z-index: 2;
            gap: 12px;
        }
        
        /* بنر بزرگتر */
        .banner-area {
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/IMG_%DB%B2%DB%B0%DB%B2%DB%B6%DB%B0%DB%B5%DB%B3%DB%B0_%DB%B1%DB%B8%DB%B2%DB%B3%DB%B2%DB%B8.png') no-repeat center center;
            background-size: contain;
            background-repeat: no-repeat;
            height: 70px;
            flex: 1;
            max-width: 350px;
        }
        
        /* آنلاین - سمت راست بنر */
        .online-box {
            background: #075e54;
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        
        .online-light {
            width: 10px;
            height: 10px;
            background: #25d366;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .online-text {
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        
        .typing-status {
            background: #dcf8c6;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #075e54;
            font-weight: 500;
        }

        /* منطقه پیام‌ها */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1;
            position: relative;
        }

        /* پیام‌ها */
        .message-wrapper {
            display: flex;
            width: 100%;
        }

        .message-wrapper.my-message {
            justify-content: flex-end;
        }

        .message-wrapper.other-message {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 78%;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .my-message .message-bubble {
            background: rgba(37, 211, 102, 0.92);
            color: #1f2f2a;
            border-bottom-right-radius: 4px;
        }

        .other-message .message-bubble {
            background: rgba(248, 248, 255, 0.95);
            color: #111;
            border-bottom-left-radius: 4px;
        }

        .sender-name {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #075e54;
        }

        .message-text {
            font-size: 13px;
            line-height: 1.4;
        }

        .message-info {
            font-size: 9px;
            color: #555;
            margin-top: 4px;
            display: flex;
            justify-content: flex-end;
            gap: 4px;
        }
        
        .my-message .message-info {
            color: #2a5c4a;
        }

        .tick-seen {
            color: #34b7f1;
        }

        /* ===== کادر تایپ پیام - الان حتماً هست ===== */
        .input-container {
            display: flex;
            padding: 12px 15px;
            background: white;
            gap: 12px;
            flex-shrink: 0;
            z-index: 2;
            border-top: 1px solid #e0e0e0;
        }

        .message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 30px;
            background: #f8f9fa;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }
        
        .message-input:focus {
            border-color: #25d366;
            background: white;
        }

        .send-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 48px;
            height: 48px;
            background-image: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/IMG_%DB%B2%DB%B0%DB%B2%DB%B6%DB%B0%DB%B5%DB%B3%DB%B0_%DB%B1%DB%B7%DB%B2%DB%B9%DB%B2%DB%B6.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* کادر منو */
        .context-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f2a2f;
            backdrop-filter: blur(20px);
            border-radius: 24px;
            z-index: 2000;
            min-width: 260px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .reaction-bar {
            padding: 10px;
            border-bottom: 1px solid #3a4a55;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            background: #1a2429;
        }

        .reaction {
            font-size: 26px;
            cursor: pointer;
            padding: 4px;
        }

        .reaction:hover {
            transform: scale(1.2);
        }

        .menu-item {
            padding: 12px 16px;
            cursor: pointer;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            border-bottom: 1px solid #2a3a45;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: #2a3f4a;
        }

        .menu-item.danger {
            color: #ff8a7a;
        }
        
        @media (max-width: 600px) {
            .banner-area {
                height: 50px;
                max-width: 220px;
            }
            .online-box {
                padding: 5px 12px;
            }
            .online-text {
                font-size: 11px;
            }
            .message-input {
                padding: 10px 14px;
                font-size: 13px;
            }
            .send-btn {
                width: 42px;
                height: 42px;
            }
        }
        
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #25d366;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-container">
        <div class="login-box">
            <div class="login-avatar"></div>
            <h2>📱 Hobby Land</h2>
            <input type="text" id="username" placeholder="نام کاربری">
            <input type="password" id="password" placeholder="رمز عبور">
            <button id="loginBtn">ورود</button>
            <div id="errorMsg" class="error-msg">❌ رمز اشتباه است</div>
        </div>
    </div>

    <div id="chatPage" class="chat-container hidden">
        <div class="chat-header">
            <div class="banner-area"></div>
            <div class="online-box">
                <div class="online-light"></div>
                <span class="online-text" id="onlineUsers">0 آنلاین</span>
            </div>
        </div>
        
        <div style="background: rgba(255,255,255,0.9); padding: 5px; text-align: center; z-index: 2;">
            <div id="typingStatus" class="typing-status" style="display: inline-block;"></div>
        </div>
        
        <div class="messages-area" id="messagesArea"></div>
        
        <!-- کادر تایپ پیام - اینجا هست -->
        <div class="input-container">
            <input type="text" id="messageInput" class="message-input" placeholder="پیام خود را بنویسید...">
            <button class="send-btn" id="sendBtn"></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARAsQaZhfHHPFVBOpKmPx7u90UVrJoUuM",
            authDomain: "hobby-land-b0e00.firebaseapp.com",
            databaseURL: "https://hobby-land-b0e00-default-rtdb.firebaseio.com",
            projectId: "hobby-land-b0e00",
            storageBucket: "hobby-land-b0e00.firebasestorage.app",
            messagingSenderId: "1001642178322",
            appId: "1:1001642178322:web:a2ca537d1520b9b43d65cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const validUsers = { 'حمیدرضا': 'CTF_22', 'الهه': 'CTF_11' };
        let currentUser = null;
        let contextMenuDiv = null;

        function hideContextMenu() {
            if (contextMenuDiv) { contextMenuDiv.remove(); contextMenuDiv = null; }
        }

        function showContextMenu(message, isMyMessage) {
            hideContextMenu();
            contextMenuDiv = document.createElement('div');
            contextMenuDiv.className = 'context-menu';
            
            if (!isMyMessage) {
                const reactions = ['😱', '😭', '🤣', '😁', '🩷', '🔥', '🌹', '😈', '🙈', '🍌', '🤷', '😘'];
                const reactionBar = document.createElement('div');
                reactionBar.className = 'reaction-bar';
                reactions.forEach(emoji => {
                    const span = document.createElement('span');
                    span.className = 'reaction';
                    span.textContent = emoji;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        db.ref(`messages/${message.id}/reactions/${currentUser}`).set(emoji);
                        hideContextMenu();
                    };
                    reactionBar.appendChild(span);
                });
                contextMenuDiv.appendChild(reactionBar);
            }
            
            const copyItem = document.createElement('div');
            copyItem.className = 'menu-item';
            copyItem.innerHTML = '📋 کپی متن';
            copyItem.onclick = () => { navigator.clipboard.writeText(message.text); hideContextMenu(); };
            contextMenuDiv.appendChild(copyItem);
            
            if (!isMyMessage) {
                const replyItem = document.createElement('div');
                replyItem.className = 'menu-item';
                replyItem.innerHTML = '↩️ پاسخ';
                replyItem.onclick = () => {
                    document.getElementById('messageInput').value = `در پاسخ به ${message.sender}: ${message.text.substring(0, 60)}\n---\n`;
                    document.getElementById('messageInput').focus();
                    hideContextMenu();
                };
                contextMenuDiv.appendChild(replyItem);
                
                const deleteItem = document.createElement('div');
                deleteItem.className = 'menu-item danger';
                deleteItem.innerHTML = '🗑️ حذف پیام';
                deleteItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
                contextMenuDiv.appendChild(deleteItem);
            } else {
                const editItem = document.createElement('div');
                editItem.className = 'menu-item';
                editItem.innerHTML = '✏️ ویرایش';
                editItem.onclick = () => {
                    const newText = prompt('متن جدید:', message.text);
                    if(newText && newText.trim()) db.ref(`messages/${message.id}`).update({ text: newText, edited: true });
                    hideContextMenu();
                };
                contextMenuDiv.appendChild(editItem);
                
                const deleteItem = document.createElement('div');
                deleteItem.className = 'menu-item danger';
                deleteItem.innerHTML = '🗑️ حذف این پیام';
                deleteItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
                contextMenuDiv.appendChild(deleteItem);
                
                const deleteAllItem = document.createElement('div');
                deleteAllItem.className = 'menu-item danger';
                deleteAllItem.innerHTML = '🔥 حذف همه پیام‌های من';
                deleteAllItem.onclick = () => {
                    if(confirm('همه پیام‌های شما حذف شود؟')) {
                        db.ref('messages').once('value', (snapshot) => {
                            snapshot.forEach(child => { if(child.val().sender === currentUser) db.ref(`messages/${child.key}`).remove(); });
                        });
                    }
                    hideContextMenu();
                };
                contextMenuDiv.appendChild(deleteAllItem);
            }
            document.body.appendChild(contextMenuDiv);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text || !currentUser) return;
            db.ref('messages').push({ text, sender: currentUser, timestamp: Date.now(), seen: false, reactions: {} });
            input.value = '';
            if(window.typingTimeout) clearTimeout(window.typingTimeout);
            db.ref(`typing/${currentUser}`).remove();
        }
        
        let typingTimeout;
        function startTyping() {
            if(!currentUser) return;
            db.ref(`typing/${currentUser}`).set(true);
            if(typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { db.ref(`typing/${currentUser}`).remove(); }, 1500);
        }
        
        function renderMessage(messageId, msg) {
            const area = document.getElementById('messagesArea');
            if(!area) return;
            const isMy = msg.sender === currentUser;
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isMy ? 'my-message' : 'other-message'}`;
            wrapper.dataset.messageId = messageId;
            
            let reactionsHtml = '';
            if(msg.reactions && Object.keys(msg.reactions).length > 0) {
                const unique = [...new Set(Object.values(msg.reactions))];
                reactionsHtml = `<div style="display: flex; gap: 5px; margin-top: 5px;">${unique.map(r => `<span style="font-size: 16px;">${r}</span>`).join('')}</div>`;
            }
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    ${!isMy ? `<div class="sender-name">${msg.sender}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 9px;">(ویرایش)</span>' : ''}</div>
                    <div class="message-info">
                        <span>${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</span>
                        ${isMy ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>` : ''}
                    </div>
                    ${reactionsHtml}
                </div>
            `;
            wrapper.querySelector('.message-bubble').onclick = (e) => {
                e.stopPropagation();
                showContextMenu({ id: messageId, text: msg.text, sender: msg.sender }, isMy);
            };
            
            let inserted = false;
            for(let i = 0; i < area.children.length; i++) {
                if(area.children[i].dataset.messageId && parseInt(area.children[i].dataset.messageId) < parseInt(messageId)) {
                    area.insertBefore(wrapper, area.children[i]);
                    inserted = true;
                    break;
                }
            }
            if(!inserted) area.appendChild(wrapper);
            area.scrollTop = area.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function setOnlineStatus(isOnline) {
            if(!currentUser) return;
            db.ref(`users/${currentUser}`).set({ online: isOnline, lastSeen: Date.now() });
            if(!isOnline) db.ref(`typing/${currentUser}`).remove();
        }
        
        function updateOnlineUsers() {
            db.ref('users').on('value', (snapshot) => {
                let onlineCount = 0;
                snapshot.forEach(child => { if(child.val().online) onlineCount++; });
                document.getElementById('onlineUsers').innerHTML = `${onlineCount} آنلاین`;
            });
        }
        
        function markMessagesAsSeen() {
            db.ref('messages').orderByChild('seen').equalTo(false).once('value', (snapshot) => {
                snapshot.forEach(child => {
                    if(child.val().sender !== currentUser) db.ref(`messages/${child.key}/seen`).set(true);
                });
            });
        }
        
        function listenMessages() {
            db.ref('messages').on('child_added', (snapshot) => {
                renderMessage(snapshot.key, snapshot.val());
                markMessagesAsSeen();
            });
            db.ref('messages').on('child_changed', (snapshot) => {
                const el = document.querySelector(`[data-message-id="${snapshot.key}"]`);
                if(el) el.remove();
                renderMessage(snapshot.key, snapshot.val());
            });
            db.ref('messages').on('child_removed', (snapshot) => {
                const el = document.querySelector(`[data-message-id="${snapshot.key}"]`);
                if(el) el.remove();
            });
        }
        
        function listenTyping() {
            db.ref('typing').on('value', (snapshot) => {
                const typingUsers = [];
                snapshot.forEach(child => { if(child.key !== currentUser && child.val() === true) typingUsers.push(child.key); });
                document.getElementById('typingStatus').innerHTML = typingUsers.length ? `${typingUsers.join('، ')} در حال نوشتن...` : '';
            });
        }
        
        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if(validUsers[username] && validUsers[username] === password) {
                currentUser = username;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('chatPage').classList.remove('hidden');
                setOnlineStatus(true);
                updateOnlineUsers();
                listenMessages();
                listenTyping();
                document.getElementById('messagesArea').innerHTML = '';
                window.onbeforeunload = () => setOnlineStatus(false);
                setInterval(() => { const a = document.getElementById('messagesArea'); if(a) a.scrollTop = a.scrollHeight; }, 600);
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        };
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if(e.key === 'Enter') sendMessage();
            else startTyping();
        };
        document.addEventListener('click', hideContextMenu);
    </script>
</body>
</html>
