<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیام‌رسان اختصاصی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* صفحه ورود */
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #1e3c72;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .login-container input:focus {
            border-color: #2a5298;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .login-container button:hover {
            background: #1e3c72;
        }

        .error-msg {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* صفحه چت */
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .online-light {
            width: 10px;
            height: 10px;
            background-color: #25d366;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .typing-status {
            font-size: 12px;
            color: #25d366;
            font-style: italic;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message-left {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-right {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-align: left;
            display: flex;
            justify-content: flex-end;
            gap: 5px;
        }

        .tick {
            font-size: 12px;
        }

        .tick-seen {
            color: #34b7f1;
        }

        .sender-name {
            font-size: 11px;
            color: #075e54;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
        }

        .send-btn {
            background: #075e54;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- صفحه ورود -->
    <div id="loginPage" class="login-container">
        <h2>📱 ورود به پیام‌رسان</h2>
        <input type="text" id="username" placeholder="نام کاربری">
        <input type="password" id="password" placeholder="رمز عبور">
        <button id="loginBtn">ورود</button>
        <div id="errorMsg" class="error-msg">❌ رمز اشتباه است</div>
    </div>

    <!-- صفحه چت -->
    <div id="chatPage" class="chat-container hidden">
        <div class="chat-header">
            <div class="online-info">
                <div class="online-light"></div>
                <span id="onlineUsers">0 آنلاین</span>
            </div>
            <div>
                <span id="typingStatus" class="typing-status"></span>
                <button class="logout-btn" id="logoutBtn">خروج</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <input type="text" id="messageInput" class="message-input" placeholder="پیام خود را بنویسید...">
            <button class="send-btn" id="sendBtn">📤 ارسال</button>
        </div>
    </div>

    <script>
        // اکانت‌های مجاز
        const validUsers = {
            'حمیدرضا': 'CTF_22',
            'الهه': 'CTF_11'
        };

        let currentUser = null;
        let messages = [];
        let typingTimeout = null;

        // دیتابیس ساده با localStorage
        function loadMessages() {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            }
        }

        function saveMessages() {
            localStorage.setItem('chat_messages', JSON.stringify(messages));
        }

        function getOnlineUsers() {
            const online = localStorage.getItem('online_users');
            return online ? JSON.parse(online) : [];
        }

        function setOnlineUsers(users) {
            localStorage.setItem('online_users', JSON.stringify(users));
            updateOnlineDisplay();
        }

        function addOnlineUser(user) {
            let online = getOnlineUsers();
            if (!online.includes(user)) {
                online.push(user);
                setOnlineUsers(online);
            }
        }

        function removeOnlineUser(user) {
            let online = getOnlineUsers();
            online = online.filter(u => u !== user);
            setOnlineUsers(online);
        }

        function updateOnlineDisplay() {
            const online = getOnlineUsers();
            const count = online.length;
            document.getElementById('onlineUsers').innerHTML = `${count} آنلاین`;
            
            // نمایش اسامی آنلاین
            if (count > 0) {
                document.getElementById('onlineUsers').title = online.join('، ');
            }
        }

        function setTyping(user, isTyping) {
            if (isTyping && user !== currentUser) {
                document.getElementById('typingStatus').innerHTML = `${user} در حال نوشتن...`;
            } else if (!isTyping) {
                document.getElementById('typingStatus').innerHTML = '';
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const message = {
                id: Date.now(),
                text: text,
                sender: currentUser,
                timestamp: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }),
                seen: false
            };

            messages.push(message);
            saveMessages();
            renderMessages();
            input.value = '';

            // شبیه‌سازی تیک خوردن بعد از 2 ثانیه
            setTimeout(() => {
                message.seen = true;
                saveMessages();
                renderMessages();
            }, 2000);
        }

        function renderMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.sender === currentUser ? 'message-right' : 'message-left'}`;

                let senderHtml = '';
                if (msg.sender !== currentUser) {
                    senderHtml = `<div class="sender-name">${msg.sender}</div>`;
                }

                const tickHtml = msg.sender === currentUser 
                    ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>`
                    : '';

                div.innerHTML = `
                    ${senderHtml}
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">
                        ${msg.timestamp}
                        ${tickHtml}
                    </div>
                `;

                area.appendChild(div);
            });

            area.scrollTop = area.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleTyping() {
            if (!currentUser) return;

            // به بقیه بگو در حال تایپ هستم
            const otherUser = currentUser === 'حمیدرضا' ? 'الهه' : 'حمیدرضا';
            setTyping(otherUser, false); // پاک کردن وضعیت قبلی
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            // شبیه‌سازی دریافت "در حال نوشتن" از طرف مقابل
            setTimeout(() => {
                if (Math.random() > 0.7) { // تصادفی برای نمونه
                    setTyping(otherUser, true);
                    setTimeout(() => setTyping(otherUser, false), 2000);
                }
            }, 500);
        }

        // ورود
        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (validUsers[username] && validUsers[username] === password) {
                currentUser = username;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('chatPage').classList.remove('hidden');
                
                addOnlineUser(currentUser);
                loadMessages();
                
                // شبیه‌سازی طرف مقابل آنلاین
                const otherUser = currentUser === 'حمیدرضا' ? 'الهه' : 'حمیدرضا';
                setTimeout(() => addOnlineUser(otherUser), 500);
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 2000);
            }
        };

        // خروج
        document.getElementById('logoutBtn').onclick = () => {
            removeOnlineUser(currentUser);
            currentUser = null;
            document.getElementById('chatPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        };

        // ارسال پیام
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
            else handleTyping();
        };

        // تیک سین خودکار برای پیام‌های قبلی
        setInterval(() => {
            let changed = false;
            messages.forEach(msg => {
                if (msg.sender === currentUser && !msg.seen) {
                    msg.seen = true;
                    changed = true;
                }
            });
            if (changed) {
                saveMessages();
                renderMessages();
            }
        }, 3000);
    </script>
</body>
</html>
