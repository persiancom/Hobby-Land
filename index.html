<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hobby Land - پیام‌رسان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* صفحه ورود */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/hobbyland_floating_background.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 45px;
            padding: 30px 25px 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .login-logo {
            width: 130px;
            height: 130px;
            margin: -75px auto 10px auto;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_0000000017e871f89c0d959cc013167b%20(1).png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2 { 
            margin-bottom: 20px; 
            color: #1e3c72; 
            font-size: 24px;
            font-weight: 700;
        }
        .login-box input {
            width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #ddd;
            border-radius: 50px; font-size: 15px; background: #f8f9fa; outline: none;
        }
        .login-box button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #25d366, #128c7e);
            color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 15px;
        }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 12px; display: none; }

        /* صفحه چت */
        .chat-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000640c71f88b100e7f56cbb09d.png?raw=true') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        
        .hidden { display: none !important; }

        /* هدر */
        .chat-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(192, 132, 252, 0.5);
            box-shadow: 0 0 8px rgba(192, 132, 252, 0.3);
            z-index: 10;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .banner-area {
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/IMG_%DB%B2%DB%B0%DB%B2%DB%B6%DB%B0%DB%B5%DB%B3%DB%B0_%DB%B1%DB%B8%DB%B2%DB%B3%DB%B2%DB%B8.png') no-repeat center center;
            background-size: contain;
            background-repeat: no-repeat;
            height: 55px;
            flex: 1;
            max-width: 250px;
        }
        
        .online-box {
            position: relative;
            width: 160px;
            height: 60px;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000446871fd9d03516007d5fe16.png') no-repeat center center;
            background-size: contain;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .online-count {
            color: #c084fc;
            font-size: 18px;
            font-weight: bold;
            margin-left: 8px;
            margin-top: -4px;
        }
        
        /* نوار در حال نوشتن */
        .typing-bar {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            font-size: 11px;
            color: #c084fc;
            text-align: center;
            flex-shrink: 0;
            display: none;
            border-bottom: 1px solid rgba(192, 132, 252, 0.3);
        }

        /* منطقه پیام‌ها */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-bottom: 20px;
        }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 2px; }
        .message-wrapper.my-message { justify-content: flex-end; }
        .message-wrapper.other-message { justify-content: flex-start; }
        
        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .my-message .message-bubble {
            background: rgba(0, 132, 255, 0.85);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other-message .message-bubble {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            border-bottom-left-radius: 4px;
        }
        .sender-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; }
        .other-message .sender-name { color: #075e54; }
        .my-message .sender-name { color: #e0f0ff; }
        
        .message-text { font-size: 13px; line-height: 1.4; }
        .message-info { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; }
        .my-message .message-info { color: #d0eaff; }
        .other-message .message-info { color: #777; }
        .tick-seen { color: #34b7f1; }
        
        .reply-preview {
            background: rgba(0,0,0,0.08); border-radius: 10px; padding: 4px 8px; margin-bottom: 5px;
            border-right: 3px solid #25d366; font-size: 10px;
        }
        .my-message .reply-preview { background: rgba(255,255,255,0.2); border-right-color: #ffd966; }
        .reply-sender { font-weight: bold; font-size: 9px; }
        .reply-text { font-size: 9px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .replying-box {
            background: #e8f5e9; padding: 6px 10px; margin: 0 10px 5px 10px; border-radius: 14px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 4px solid #25d366; font-size: 11px;
        }
        .replying-cancel {
            background: none; border: none; font-size: 16px; cursor: pointer; color: #777;
        }

        /* ===== کادر تایپ - FIXED و پایین صفحه ===== */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ddd;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .input-wrapper {
            display: flex; 
            padding: 10px 12px; 
            gap: 10px;
            align-items: center;
        }
        .message-input {
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #ddd;
            border-radius: 30px;
            background: white;
            outline: none; 
            font-family: inherit; 
            font-size: 14px;
        }
        .message-input:focus {
            border-color: #c084fc;
        }
        .send-btn {
            background: transparent; 
            border: none; 
            padding: 0; 
            cursor: pointer;
            width: 44px; 
            height: 44px;
            background-image: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000a2f871fda366f0a9ff6a56b0.png');
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            flex-shrink: 0;
        }

        /* فضای خالی پایین برای اینکه آخرین پیام زیر کادر تایپ نره */
        .messages-area {
            padding-bottom: 80px;
        }

        .context-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1f2a2f; backdrop-filter: blur(20px); border-radius: 24px;
            z-index: 2000; min-width: 240px; overflow: hidden;
            border: 1px solid rgba(192, 132, 252, 0.5);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.3);
        }
        .reaction-bar { padding: 8px; border-bottom: 1px solid #3a4a55; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; background: #1a2429; }
        .reaction { font-size: 24px; cursor: pointer; padding: 3px; }
        .menu-item { padding: 10px 14px; cursor: pointer; color: #f0f0f0; display: flex; align-items: center; gap: 10px; font-size: 13px; border-bottom: 1px solid #2a3a45; }
        .menu-item.danger { color: #ff8a7a; }
        
        @media (max-width: 600px) {
            .banner-area { height: 45px; max-width: 180px; }
            .online-box { width: 130px; height: 50px; }
            .online-count { font-size: 15px; margin-left: 6px; margin-top: -3px; }
            .message-bubble { max-width: 85%; }
            .send-btn { width: 40px; height: 40px; }
            .message-input { padding: 10px 14px; font-size: 13px; }
            .chat-header { padding: 8px 10px; }
            .typing-bar { font-size: 10px; padding: 4px 10px; }
            .messages-area { padding-bottom: 75px; }
        }
        .messages-area::-webkit-scrollbar { width: 3px; }
        .messages-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }
    </style>
</head>
<body>

<div id="loginPage" class="login-container">
    <div class="login-box">
        <div class="login-logo"></div>
        <h2>Hobby Land</h2>
        <input type="text" id="username" placeholder="نام کاربری">
        <input type="password" id="password" placeholder="رمز عبور">
        <button id="loginBtn">ورود</button>
        <div id="errorMsg" class="error-msg">❌ رمز اشتباه است</div>
    </div>
</div>

<div id="chatPage" class="chat-container hidden">
    <div class="chat-header">
        <div class="banner-area"></div>
        <div class="online-box">
            <span class="online-count" id="onlineUsers">0</span>
        </div>
    </div>
    
    <div id="typingBar" class="typing-bar"></div>
    
    <div class="messages-area" id="messagesArea"></div>
    
    <div class="input-container">
        <div id="replyingIndicator" style="display: none;" class="replying-box">
            <div>
                <span style="font-weight: bold;">در پاسخ به <span id="replyToName"></span></span>
                <div id="replyToText" style="font-size: 10px; color: #555;"></div>
            </div>
            <button id="cancelReplyBtn" class="replying-cancel">✖</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="messageInput" class="message-input" placeholder="پیام خود را بنویسید...">
            <button class="send-btn" id="sendBtn"></button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARAsQaZhfHHPFVBOpKmPx7u90VRrJoUuM",
        authDomain: "hobby-land-b0e00.firebaseapp.com",
        databaseURL: "https://hobby-land-b0e00-default-rtdb.firebaseio.com",
        projectId: "hobby-land-b0e00",
        storageBucket: "hobby-land-b0e00.firebasestorage.app",
        messagingSenderId: "1001642178322",
        appId: "1:1001642178322:web:a2ca537d1520b9b43d65cb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const validUsers = { 'حمیدرضا': 'CTF_22', 'الهه': 'CTF_11' };
    let currentUser = null;
    let contextMenuDiv = null;
    let editingMessageId = null;
    let replyingTo = null;
    let isOnline = false;
    let onlineRef = null;
    let typingCheckInterval = null;

    function hideContextMenu() { if(contextMenuDiv) { contextMenuDiv.remove(); contextMenuDiv = null; } }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        if(area) area.scrollTop = area.scrollHeight;
    }

    function setUserOnline() {
        if(!currentUser) return;
        isOnline = true;
        if(onlineRef) onlineRef.off();
        onlineRef = db.ref(`users/${currentUser}`);
        onlineRef.set({
            online: true,
            lastSeen: firebase.database.ServerValue.TIMESTAMP,
            chatActive: true
        });
        if(typingCheckInterval) clearInterval(typingCheckInterval);
        typingCheckInterval = setInterval(() => {
            if(currentUser && isOnline && !document.hidden) {
                db.ref(`users/${currentUser}/lastSeen`).set(firebase.database.ServerValue.TIMESTAMP);
            }
        }, 10000);
    }
    
    function setUserOffline() {
        if(!currentUser) return;
        isOnline = false;
        if(typingCheckInterval) clearInterval(typingCheckInterval);
        if(onlineRef) {
            onlineRef.update({ online: false, chatActive: false });
            onlineRef = null;
        } else {
            db.ref(`users/${currentUser}`).update({ online: false, chatActive: false });
        }
        db.ref(`typing/${currentUser}`).remove();
    }
    
    function cleanStaleUsers() {
        const now = Date.now();
        db.ref('users').once('value', (snapshot) => {
            snapshot.forEach(child => {
                const userData = child.val();
                if(userData && userData.online === true && userData.lastSeen) {
                    if(now - userData.lastSeen > 15000) {
                        db.ref(`users/${child.key}`).update({ online: false, chatActive: false });
                    }
                }
            });
        });
    }
    setInterval(() => cleanStaleUsers(), 8000);

    function initOnlineTracking() {
        window.addEventListener('beforeunload', () => setUserOffline());
        document.addEventListener('visibilitychange', () => {
            if(document.hidden) setUserOffline();
            else { setUserOnline(); db.ref(`typing/${currentUser}`).remove(); }
        });
        window.addEventListener('offline', () => setUserOffline());
        window.addEventListener('online', () => { if(currentUser) setTimeout(setUserOnline, 500); });
    }

    function showContextMenu(message, isMyMessage) {
        hideContextMenu();
        contextMenuDiv = document.createElement('div');
        contextMenuDiv.className = 'context-menu';
        
        if(!isMyMessage) {
            const reactions = ['😱','😭','🤣','😁','🩷','🔥','🌹','😈','🙈','🍌','🤷','😘'];
            const bar = document.createElement('div');
            bar.className = 'reaction-bar';
            reactions.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'reaction';
                span.textContent = emoji;
                span.onclick = (e) => {
                    e.stopPropagation();
                    db.ref(`messages/${message.id}/reactions/${currentUser}`).set(emoji);
                    hideContextMenu();
                };
                bar.appendChild(span);
            });
            contextMenuDiv.appendChild(bar);
        }
        
        const copyItem = document.createElement('div');
        copyItem.className = 'menu-item';
        copyItem.innerHTML = '📋 کپی متن';
        copyItem.onclick = () => { navigator.clipboard.writeText(message.text); hideContextMenu(); };
        contextMenuDiv.appendChild(copyItem);
        
        if(!isMyMessage) {
            const replyItem = document.createElement('div');
            replyItem.className = 'menu-item';
            replyItem.innerHTML = '↩️ پاسخ';
            replyItem.onclick = () => {
                startReply(message.id, message.sender, message.text);
                hideContextMenu();
            };
            contextMenuDiv.appendChild(replyItem);
            
            const delItem = document.createElement('div');
            delItem.className = 'menu-item danger';
            delItem.innerHTML = '🗑️ حذف پیام';
            delItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
            contextMenuDiv.appendChild(delItem);
        } else {
            const editItem = document.createElement('div');
            editItem.className = 'menu-item';
            editItem.innerHTML = '✏️ ویرایش';
            editItem.onclick = () => {
                editingMessageId = message.id;
                document.getElementById('messageInput').value = message.text;
                document.getElementById('messageInput').focus();
                hideContextMenu();
            };
            contextMenuDiv.appendChild(editItem);
            
            const delItem = document.createElement('div');
            delItem.className = 'menu-item danger';
            delItem.innerHTML = '🗑️ حذف این پیام';
            delItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
            contextMenuDiv.appendChild(delItem);
            
            const delAllItem = document.createElement('div');
            delAllItem.className = 'menu-item danger';
            delAllItem.innerHTML = '🔥 حذف همه پیام‌های من';
            delAllItem.onclick = () => {
                if(confirm('همه پیام‌های شما حذف شود؟')) {
                    db.ref('messages').once('value', (snapshot) => {
                        snapshot.forEach(child => { if(child.val().sender === currentUser) db.ref(`messages/${child.key}`).remove(); });
                    });
                }
                hideContextMenu();
            };
            contextMenuDiv.appendChild(delAllItem);
        }
        document.body.appendChild(contextMenuDiv);
    }

    function startReply(id, name, text) {
        replyingTo = { id, sender: name, text };
        const ind = document.getElementById('replyingIndicator');
        document.getElementById('replyToName').innerText = name;
        document.getElementById('replyToText').innerText = text.length > 50 ? text.substring(0,50)+'...' : text;
        ind.style.display = 'flex';
        document.getElementById('messageInput').focus();
    }
    
    function cancelReply() {
        replyingTo = null;
        document.getElementById('replyingIndicator').style.display = 'none';
    }
    
    function sendOrEditMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !currentUser) return;
        
        if(editingMessageId) {
            db.ref(`messages/${editingMessageId}`).update({ text, edited: true });
            editingMessageId = null;
            input.value = '';
            cancelReply();
            db.ref(`typing/${currentUser}`).remove();
            return;
        }
        
        const data = { text, sender: currentUser, timestamp: Date.now(), seen: false, reactions: {} };
        if(replyingTo) {
            data.replyTo = { id: replyingTo.id, sender: replyingTo.sender, text: replyingTo.text.substring(0, 100) };
        }
        db.ref('messages').push(data);
        input.value = '';
        cancelReply();
        db.ref(`typing/${currentUser}`).remove();
    }

    let typingTimeout;
    function startTyping() {
        if(!currentUser) return;
        db.ref(`typing/${currentUser}`).set(true);
        if(typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => db.ref(`typing/${currentUser}`).remove(), 1500);
    }

    function renderMessage(id, msg) {
        const area = document.getElementById('messagesArea');
        if(!area) return;
        
        const existing = document.querySelector(`[data-message-id="${id}"]`);
        if(existing) {
            const bubble = existing.querySelector('.message-bubble');
            const isMy = msg.sender === currentUser;
            let replyHtml = '';
            if(msg.replyTo) {
                replyHtml = `<div class="reply-preview"><div class="reply-sender">${escapeHtml(msg.replyTo.sender)}</div><div class="reply-text">${escapeHtml(msg.replyTo.text)}</div></div>`;
            }
            let reactionsHtml = '';
            if(msg.reactions && Object.keys(msg.reactions).length) {
                const unique = [...new Set(Object.values(msg.reactions))];
                reactionsHtml = `<div style="display: flex; gap: 4px; margin-top: 4px;">${unique.map(r => `<span style="font-size: 15px;">${r}</span>`).join('')}</div>`;
            }
            bubble.innerHTML = `
                ${!isMy ? `<div class="sender-name">${msg.sender}</div>` : ''}
                ${replyHtml}
                <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 8px;">(ویرایش)</span>' : ''}</div>
                <div class="message-info">
                    <span>${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</span>
                    ${isMy ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>` : ''}
                </div>
                ${reactionsHtml}
            `;
            return;
        }
        
        const isMy = msg.sender === currentUser;
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${isMy ? 'my-message' : 'other-message'}`;
        wrapper.dataset.messageId = id;
        
        let replyHtml = '';
        if(msg.replyTo) {
            replyHtml = `<div class="reply-preview"><div class="reply-sender">${escapeHtml(msg.replyTo.sender)}</div><div class="reply-text">${escapeHtml(msg.replyTo.text)}</div></div>`;
        }
        let reactionsHtml = '';
        if(msg.reactions && Object.keys(msg.reactions).length) {
            const unique = [...new Set(Object.values(msg.reactions))];
            reactionsHtml = `<div style="display: flex; gap: 4px; margin-top: 4px;">${unique.map(r => `<span style="font-size: 15px;">${r}</span>`).join('')}</div>`;
        }
        
        wrapper.innerHTML = `
            <div class="message-bubble">
                ${!isMy ? `<div class="sender-name">${msg.sender}</div>` : ''}
                ${replyHtml}
                <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 8px;">(ویرایش)</span>' : ''}</div>
                <div class="message-info">
                    <span>${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</span>
                    ${isMy ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>` : ''}
                </div>
                ${reactionsHtml}
            </div>
        `;
        wrapper.querySelector('.message-bubble').onclick = (e) => {
            e.stopPropagation();
            showContextMenu({ id, text: msg.text, sender: msg.sender }, isMy);
        };
        
        let inserted = false;
        for(let i = 0; i < area.children.length; i++) {
            const cid = area.children[i].dataset.messageId;
            if(cid && parseInt(cid) > parseInt(id)) {
                area.insertBefore(wrapper, area.children[i]);
                inserted = true;
                break;
            }
        }
        if(!inserted) area.appendChild(wrapper);
        scrollToBottom();
    }

    function updateOnlineUsers() {
        db.ref('users').on('value', (snapshot) => {
            let count = 0;
            snapshot.forEach(child => { if(child.val().online === true) count++; });
            document.getElementById('onlineUsers').innerHTML = count;
        });
    }

    function markAsSeen() {
        db.ref('messages').orderByChild('seen').equalTo(false).once('value', (snapshot) => {
            snapshot.forEach(child => {
                if(child.val().sender !== currentUser) db.ref(`messages/${child.key}/seen`).set(true);
            });
        });
    }

    function listenMessages() {
        db.ref('messages').on('child_added', (s) => { renderMessage(s.key, s.val()); markAsSeen(); });
        db.ref('messages').on('child_changed', (s) => renderMessage(s.key, s.val()));
        db.ref('messages').on('child_removed', (s) => { document.querySelector(`[data-message-id="${s.key}"]`)?.remove(); });
    }

    function listenTyping() {
        db.ref('typing').on('value', (snapshot) => {
            let typingUser = null;
            snapshot.forEach(child => { if(child.key !== currentUser && child.val() === true) typingUser = child.key; });
            const bar = document.getElementById('typingBar');
            if(bar) {
                if(typingUser) { bar.innerHTML = `✍️ ${typingUser} در حال نوشتن...`; bar.style.display = 'block'; }
                else { bar.innerHTML = ''; bar.style.display = 'none'; }
            }
        });
    }

    document.getElementById('loginBtn').onclick = () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        if(validUsers[user] && validUsers[user] === pass) {
            currentUser = user;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('chatPage').classList.remove('hidden');
            initOnlineTracking();
            setUserOnline();
            updateOnlineUsers();
            listenMessages();
            listenTyping();
            document.getElementById('messagesArea').innerHTML = '';
            scrollToBottom();
        } else {
            const err = document.getElementById('errorMsg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 2000);
        }
    };

    document.getElementById('sendBtn').onclick = sendOrEditMessage;
    document.getElementById('messageInput').onkeypress = (e) => {
        if(e.key === 'Enter') sendOrEditMessage();
        else startTyping();
    };
    document.getElementById('cancelReplyBtn').onclick = cancelReply;
    document.addEventListener('click', hideContextMenu);
</script>
</body>
</html>
