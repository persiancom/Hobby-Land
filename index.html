<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hobby Land - پیام‌رسان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* ================= صفحه ورود ================= */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/hobbyland_floating_background.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 45px;
            padding: 30px 25px 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        /* لوگو بدون حاشیه */
        .login-logo {
            width: 150px;
            height: 150px;
            margin: -85px auto 10px auto;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_0000000017e871f89c0d959cc013167b%20(1).png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2 { 
            margin-bottom: 20px; 
            color: #1e3c72; 
            font-size: 26px;
            font-weight: 700;
        }
        .login-box input {
            width: 100%; padding: 14px 18px; margin: 10px 0; border: 1px solid #ddd;
            border-radius: 50px; font-size: 16px; background: #f8f9fa; outline: none;
            transition: 0.2s;
        }
        .login-box input:focus {
            border-color: #25d366;
            box-shadow: 0 0 0 3px rgba(37,211,102,0.2);
        }
        .login-box button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #25d366, #128c7e);
            color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        .login-box button:hover {
            transform: scale(1.02);
        }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 12px; display: none; }

        /* ================= صفحه چت ================= */
        .chat-container {
            width: 100%; height: 100vh; display: flex; flex-direction: column;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000640c71f88b100e7f56cbb09d.png?raw=true') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        .chat-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
        .hidden { display: none !important; }

        .chat-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 2;
            gap: 12px;
        }
        .banner-area {
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/IMG_%DB%B2%DB%B0%DB%B2%DB%B6%DB%B0%DB%B5%DB%B3%DB%B0_%DB%B1%DB%B8%DB%B2%DB%B3%DB%B2%DB%B8.png') no-repeat center center;
            background-size: contain;
            background-repeat: no-repeat;
            height: 70px;
            flex: 1;
            max-width: 350px;
        }
        
        .online-box {
            position: relative;
            width: 210px;
            height: 80px;
            background: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000446871fd9d03516007d5fe16.png') no-repeat center center;
            background-size: contain;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 20px;
            box-shadow: 0 0 8px rgba(192, 132, 252, 0.5), 0 0 15px rgba(192, 132, 252, 0.2);
        }
        .online-count {
            color: #c084fc;
            font-size: 22px;
            font-weight: bold;
            margin-left: 12px;
            margin-top: -6px;
            letter-spacing: 1px;
        }
        
        .typing-dots {
            display: none;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 40px;
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            border: 1px solid rgba(192, 132, 252, 0.5);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.3);
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #c084fc;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(2) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(3) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }
        .typing-text {
            color: #c084fc;
            font-size: 12px;
            margin-left: 6px;
            font-weight: 500;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1;
            position: relative;
            padding-bottom: 100px;
        }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.my-message { justify-content: flex-end; }
        .message-wrapper.other-message { justify-content: flex-start; }
        
        .message-bubble {
            max-width: 78%;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }
        .my-message .message-bubble {
            background: rgba(0, 132, 255, 0.85);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other-message .message-bubble {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            border-bottom-left-radius: 4px;
        }
        .sender-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; opacity: 0.9; }
        .other-message .sender-name { color: #075e54; }
        .my-message .sender-name { color: #e0f0ff; }
        
        .message-text { font-size: 13px; line-height: 1.4; }
        .message-info { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; }
        .my-message .message-info { color: #d0eaff; }
        .other-message .message-info { color: #777; }
        .tick-seen { color: #34b7f1; }
        
        .reply-preview {
            background: rgba(0,0,0,0.08); border-radius: 12px; padding: 5px 8px; margin-bottom: 6px;
            border-right: 3px solid #25d366; font-size: 11px;
        }
        .my-message .reply-preview { background: rgba(255,255,255,0.2); border-right-color: #ffd966; }
        .reply-sender { font-weight: bold; font-size: 10px; }
        .reply-text { font-size: 10px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .replying-box {
            background: #e8f5e9; padding: 8px 12px; margin: 0 12px 8px 12px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 4px solid #25d366; font-size: 12px;
        }
        .replying-cancel {
            background: none; border: none; font-size: 18px; cursor: pointer; color: #777;
        }

        .input-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-top: 1px solid rgba(192, 132, 252, 0.3);
            box-shadow: 0 -4px 15px rgba(192, 132, 252, 0.15);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .input-wrapper {
            display: flex; padding: 12px 15px; gap: 12px;
        }
        .message-input {
            flex: 1; padding: 12px 18px; border: 1px solid rgba(192, 132, 252, 0.4);
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.9);
            outline: none; font-family: inherit; font-size: 14px;
            transition: 0.2s;
            box-shadow: 0 0 5px rgba(192, 132, 252, 0.2);
        }
        .message-input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.4);
            background: white;
        }
        .send-btn {
            background: transparent; border: none; padding: 0; cursor: pointer;
            width: 48px; height: 48px;
            background-image: url('https://raw.githubusercontent.com/persiancom/Hobby-Land/main/file_00000000a2f871fda366f0a9ff6a56b0.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 4px #c084fc);
        }
        .send-btn:active { transform: scale(0.95); }

        .context-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1f2a2f; backdrop-filter: blur(20px); border-radius: 24px;
            z-index: 2000; min-width: 260px; overflow: hidden; border: 1px solid rgba(192, 132, 252, 0.4);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }
        .reaction-bar { padding: 10px; border-bottom: 1px solid #3a4a55; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; background: #1a2429; }
        .reaction { font-size: 26px; cursor: pointer; padding: 4px; transition: 0.1s; }
        .reaction:active { transform: scale(1.2); }
        .menu-item { padding: 12px 16px; cursor: pointer; color: #f0f0f0; display: flex; align-items: center; gap: 10px; font-size: 14px; border-bottom: 1px solid #2a3a45; }
        .menu-item.danger { color: #ff8a7a; }
        
        @media (max-width: 600px) {
            .banner-area { height: 50px; max-width: 200px; }
            .online-box { width: 170px; height: 65px; }
            .online-count { font-size: 18px; margin-left: 8px; margin-top: -4px; }
            .message-bubble { max-width: 85%; }
            .send-btn { width: 42px; height: 42px; }
            .typing-dots { bottom: 72px; padding: 6px 14px; }
            .messages-area { padding-bottom: 85px; }
            .login-logo { width: 130px; height: 130px; margin-top: -75px; }
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }
    </style>
</head>
<body>

<div id="loginPage" class="login-container">
    <div class="login-box">
        <div class="login-logo"></div>
        <h2>Hobby Land</h2>
        <input type="text" id="username" placeholder="نام کاربری">
        <input type="password" id="password" placeholder="رمز عبور">
        <button id="loginBtn">ورود</button>
        <div id="errorMsg" class="error-msg">❌ رمز اشتباه است</div>
    </div>
</div>

<div id="chatPage" class="chat-container hidden">
    <div class="chat-header">
        <div class="banner-area"></div>
        <div class="online-box">
            <span class="online-count" id="onlineUsers">0</span>
        </div>
    </div>
    
    <div class="messages-area" id="messagesArea"></div>
    
    <div class="input-container">
        <div id="replyingIndicator" style="display: none;" class="replying-box">
            <div>
                <span style="font-weight: bold;">در پاسخ به <span id="replyToName"></span></span>
                <div id="replyToText" style="font-size: 11px; color: #555;"></div>
            </div>
            <button id="cancelReplyBtn" class="replying-cancel">✖</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="messageInput" class="message-input" placeholder="پیام خود را بنویسید...">
            <button class="send-btn" id="sendBtn"></button>
        </div>
    </div>
</div>

<div id="typingIndicator" class="typing-dots">
    <span class="typing-text">در حال نوشتن</span>
    <span></span><span></span><span></span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARAsQaZhfHHPFVBOpKmPx7u90VRrJoUuM",
        authDomain: "hobby-land-b0e00.firebaseapp.com",
        databaseURL: "https://hobby-land-b0e00-default-rtdb.firebaseio.com",
        projectId: "hobby-land-b0e00",
        storageBucket: "hobby-land-b0e00.firebasestorage.app",
        messagingSenderId: "1001642178322",
        appId: "1:1001642178322:web:a2ca537d1520b9b43d65cb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const validUsers = { 'حمیدرضا': 'CTF_22', 'الهه': 'CTF_11' };
    let currentUser = null;
    let contextMenuDiv = null;
    let editingMessageId = null;
    let replyingTo = null;
    let isOnline = false;
    let onlineRef = null;
    let typingCheckInterval = null;

    function hideContextMenu() { if(contextMenuDiv) { contextMenuDiv.remove(); contextMenuDiv = null; } }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    function setUserOnline() {
        if(!currentUser) return;
        isOnline = true;
        if(onlineRef) onlineRef.off();
        onlineRef = db.ref(`users/${currentUser}`);
        onlineRef.set({
            online: true,
            lastSeen: firebase.database.ServerValue.TIMESTAMP,
            chatActive: true
        });
        
        if(typingCheckInterval) clearInterval(typingCheckInterval);
        typingCheckInterval = setInterval(() => {
            if(currentUser && isOnline && !document.hidden) {
                db.ref(`users/${currentUser}/lastSeen`).set(firebase.database.ServerValue.TIMESTAMP);
            }
        }, 10000);
    }
    
    function setUserOffline() {
        if(!currentUser) return;
        isOnline = false;
        if(typingCheckInterval) clearInterval(typingCheckInterval);
        if(onlineRef) {
            onlineRef.update({ online: false, chatActive: false });
            onlineRef = null;
        } else {
            db.ref(`users/${currentUser}`).update({ online: false, chatActive: false });
        }
        db.ref(`typing/${currentUser}`).remove();
    }
    
    function cleanStaleUsers() {
        const now = Date.now();
        db.ref('users').once('value', (snapshot) => {
            snapshot.forEach(child => {
                const userData = child.val();
                if(userData && userData.online === true && userData.lastSeen) {
                    const lastSeen = userData.lastSeen;
                    if(now - lastSeen > 15000) {
                        db.ref(`users/${child.key}`).update({ online: false, chatActive: false });
                    }
                }
            });
        });
    }
    setInterval(() => cleanStaleUsers(), 8000);

    function initOnlineTracking() {
        window.addEventListener('beforeunload', () => { setUserOffline(); });
        
        document.addEventListener('visibilitychange', () => {
            if(document.hidden) {
                setUserOffline();
            } else {
                setUserOnline();
                db.ref(`typing/${currentUser}`).remove();
            }
        });
        
        window.addEventListener('offline', () => { setUserOffline(); });
        window.addEventListener('online', () => { if(currentUser) setTimeout(() => setUserOnline(), 500); });
    }

    function showContextMenu(message, isMyMessage) {
        hideContextMenu();
        contextMenuDiv = document.createElement('div');
        contextMenuDiv.className = 'context-menu';
        
        if(!isMyMessage) {
            const reactions = ['😱','😭','🤣','😁','🩷','🔥','🌹','😈','🙈','🍌','🤷','😘'];
            const reactionBar = document.createElement('div');
            reactionBar.className = 'reaction-bar';
            reactions.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'reaction';
                span.textContent = emoji;
                span.onclick = (e) => {
                    e.stopPropagation();
                    db.ref(`messages/${message.id}/reactions/${currentUser}`).set(emoji);
                    hideContextMenu();
                };
                reactionBar.appendChild(span);
            });
            contextMenuDiv.appendChild(reactionBar);
        }
        
        const copyItem = document.createElement('div');
        copyItem.className = 'menu-item';
        copyItem.innerHTML = '📋 کپی متن';
        copyItem.onclick = () => { navigator.clipboard.writeText(message.text); hideContextMenu(); };
        contextMenuDiv.appendChild(copyItem);
        
        if(!isMyMessage) {
            const replyItem = document.createElement('div');
            replyItem.className = 'menu-item';
            replyItem.innerHTML = '↩️ پاسخ';
            replyItem.onclick = () => {
                startReply(message.id, message.sender, message.text);
                hideContextMenu();
            };
            contextMenuDiv.appendChild(replyItem);
            
            const deleteItem = document.createElement('div');
            deleteItem.className = 'menu-item danger';
            deleteItem.innerHTML = '🗑️ حذف پیام';
            deleteItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
            contextMenuDiv.appendChild(deleteItem);
        } else {
            const editItem = document.createElement('div');
            editItem.className = 'menu-item';
            editItem.innerHTML = '✏️ ویرایش';
            editItem.onclick = () => {
                editingMessageId = message.id;
                document.getElementById('messageInput').value = message.text;
                document.getElementById('messageInput').focus();
                hideContextMenu();
            };
            contextMenuDiv.appendChild(editItem);
            
            const deleteItem = document.createElement('div');
            deleteItem.className = 'menu-item danger';
            deleteItem.innerHTML = '🗑️ حذف این پیام';
            deleteItem.onclick = () => { if(confirm('حذف شود؟')) db.ref(`messages/${message.id}`).remove(); hideContextMenu(); };
            contextMenuDiv.appendChild(deleteItem);
            
            const deleteAllItem = document.createElement('div');
            deleteAllItem.className = 'menu-item danger';
            deleteAllItem.innerHTML = '🔥 حذف همه پیام‌های من';
            deleteAllItem.onclick = () => {
                if(confirm('همه پیام‌های شما حذف شود؟')) {
                    db.ref('messages').once('value', (snapshot) => {
                        snapshot.forEach(child => { if(child.val().sender === currentUser) db.ref(`messages/${child.key}`).remove(); });
                    });
                }
                hideContextMenu();
            };
            contextMenuDiv.appendChild(deleteAllItem);
        }
        document.body.appendChild(contextMenuDiv);
    }

    function startReply(messageId, senderName, messageText) {
        replyingTo = { id: messageId, sender: senderName, text: messageText };
        const indicator = document.getElementById('replyingIndicator');
        document.getElementById('replyToName').innerText = senderName;
        document.getElementById('replyToText').innerText = messageText.length > 50 ? messageText.substring(0,50)+'...' : messageText;
        indicator.style.display = 'flex';
        document.getElementById('messageInput').focus();
    }
    
    function cancelReply() {
        replyingTo = null;
        document.getElementById('replyingIndicator').style.display = 'none';
    }
    
    function sendOrEditMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !currentUser) return;
        
        if(editingMessageId) {
            db.ref(`messages/${editingMessageId}`).update({
                text: text,
                edited: true
            });
            editingMessageId = null;
            input.value = '';
            cancelReply();
            db.ref(`typing/${currentUser}`).remove();
            return;
        }
        
        const messageData = {
            text: text,
            sender: currentUser,
            timestamp: Date.now(),
            seen: false,
            reactions: {}
        };
        if(replyingTo) {
            messageData.replyTo = {
                id: replyingTo.id,
                sender: replyingTo.sender,
                text: replyingTo.text.substring(0, 100)
            };
        }
        db.ref('messages').push(messageData);
        input.value = '';
        cancelReply();
        db.ref(`typing/${currentUser}`).remove();
    }

    let typingTimeout;
    function startTyping() {
        if(!currentUser) return;
        db.ref(`typing/${currentUser}`).set(true);
        if(typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { db.ref(`typing/${currentUser}`).remove(); }, 1500);
    }

    function renderMessage(messageId, msg) {
        const area = document.getElementById('messagesArea');
        if(!area) return;
        
        const existingMsg = document.querySelector(`[data-message-id="${messageId}"]`);
        if(existingMsg) {
            const bubble = existingMsg.querySelector('.message-bubble');
            const isMy = msg.sender === currentUser;
            
            let replyHtml = '';
            if(msg.replyTo) {
                replyHtml = `
                    <div class="reply-preview">
                        <div class="reply-sender">${escapeHtml(msg.replyTo.sender)}</div>
                        <div class="reply-text">${escapeHtml(msg.replyTo.text)}</div>
                    </div>
                `;
            }
            
            let reactionsHtml = '';
            if(msg.reactions && Object.keys(msg.reactions).length > 0) {
                const unique = [...new Set(Object.values(msg.reactions))];
                reactionsHtml = `<div style="display: flex; gap: 5px; margin-top: 5px;">${unique.map(r => `<span style="font-size: 16px;">${r}</span>`).join('')}</div>`;
            }
            
            bubble.innerHTML = `
                ${!isMy ? `<div class="sender-name">${msg.sender}</div>` : ''}
                ${replyHtml}
                <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 9px;">(ویرایش)</span>' : ''}</div>
                <div class="message-info">
                    <span>${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</span>
                    ${isMy ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>` : ''}
                </div>
                ${reactionsHtml}
            `;
            return;
        }
        
        const isMy = msg.sender === currentUser;
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${isMy ? 'my-message' : 'other-message'}`;
        wrapper.dataset.messageId = messageId;
        
        let replyHtml = '';
        if(msg.replyTo) {
            replyHtml = `
                <div class="reply-preview">
                    <div class="reply-sender">${escapeHtml(msg.replyTo.sender)}</div>
                    <div class="reply-text">${escapeHtml(msg.replyTo.text)}</div>
                </div>
            `;
        }
        
        let reactionsHtml = '';
        if(msg.reactions && Object.keys(msg.reactions).length > 0) {
            const unique = [...new Set(Object.values(msg.reactions))];
            reactionsHtml = `<div style="display: flex; gap: 5px; margin-top: 5px;">${unique.map(r => `<span style="font-size: 16px;">${r}</span>`).join('')}</div>`;
        }
        
        wrapper.innerHTML = `
            <div class="message-bubble">
                ${!isMy ? `<div class="sender-name">${msg.sender}</div>` : ''}
                ${replyHtml}
                <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 9px;">(ویرایش)</span>' : ''}</div>
                <div class="message-info">
                    <span>${new Date(msg.timestamp).toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'})}</span>
                    ${isMy ? `<span class="tick ${msg.seen ? 'tick-seen' : ''}">${msg.seen ? '✓✓' : '✓'}</span>` : ''}
                </div>
                ${reactionsHtml}
            </div>
        `;
        wrapper.querySelector('.message-bubble').onclick = (e) => {
            e.stopPropagation();
            showContextMenu({ id: messageId, text: msg.text, sender: msg.sender }, isMy);
        };
        
        let inserted = false;
        const children = area.children;
        for(let i = 0; i < children.length; i++) {
            const childId = children[i].dataset.messageId;
            if(childId && parseInt(childId) > parseInt(messageId)) {
                area.insertBefore(wrapper, children[i]);
                inserted = true;
                break;
            }
        }
        if(!inserted) area.appendChild(wrapper);
        area.scrollTop = area.scrollHeight;
    }

    function updateOnlineUsers() {
        db.ref('users').on('value', (snapshot) => {
            let onlineCount = 0;
            snapshot.forEach(child => { 
                const userData = child.val();
                if(userData && userData.online === true) onlineCount++;
            });
            const countSpan = document.getElementById('onlineUsers');
            if(countSpan) countSpan.innerHTML = onlineCount;
        });
    }

    function markMessagesAsSeen() {
        db.ref('messages').orderByChild('seen').equalTo(false).once('value', (snapshot) => {
            snapshot.forEach(child => {
                if(child.val().sender !== currentUser) {
                    db.ref(`messages/${child.key}/seen`).set(true);
                }
            });
        });
    }

    function listenMessages() {
        db.ref('messages').on('child_added', (snapshot) => {
            renderMessage(snapshot.key, snapshot.val());
            markMessagesAsSeen();
        });
        db.ref('messages').on('child_changed', (snapshot) => {
            renderMessage(snapshot.key, snapshot.val());
        });
        db.ref('messages').on('child_removed', (snapshot) => {
            const el = document.querySelector(`[data-message-id="${snapshot.key}"]`);
            if(el) el.remove();
        });
    }

    function listenTyping() {
        db.ref('typing').on('value', (snapshot) => {
            let isSomeoneTyping = false;
            snapshot.forEach(child => { 
                if(child.key !== currentUser && child.val() === true) {
                    isSomeoneTyping = true;
                }
            });
            const typingDiv = document.getElementById('typingIndicator');
            if(typingDiv) {
                typingDiv.style.display = isSomeoneTyping ? 'flex' : 'none';
            }
        });
    }

    document.getElementById('loginBtn').onclick = () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if(validUsers[username] && validUsers[username] === password) {
            currentUser = username;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('chatPage').classList.remove('hidden');
            initOnlineTracking();
            setUserOnline();
            updateOnlineUsers();
            listenMessages();
            listenTyping();
            document.getElementById('messagesArea').innerHTML = '';
        } else {
            const err = document.getElementById('errorMsg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 2000);
        }
    };

    document.getElementById('sendBtn').onclick = sendOrEditMessage;
    document.getElementById('messageInput').onkeypress = (e) => {
        if(e.key === 'Enter') sendOrEditMessage();
        else startTyping();
    };
    document.getElementById('cancelReplyBtn').onclick = cancelReply;
    document.addEventListener('click', hideContextMenu);
</script>
</body>
</html>
